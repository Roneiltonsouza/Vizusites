<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizusites v5 - GitHub Repo Engine</title>
    <style>
        :root { --orange: #ff6a00; --blue: #00d2ff; --dark: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at top, #1e293b, var(--dark)); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { width: 95%; max-width: 500px; padding: 30px; border-radius: 20px; background: rgba(30, 41, 59, 0.95); border: 2px solid rgba(255, 106, 0, 0.3); text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        h1 { background: linear-gradient(135deg, var(--orange), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        input, textarea { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,106,0,0.2); border-radius: 10px; padding: 15px; color: var(--blue); margin-top: 10px; outline: none; }
        textarea { height: 180px; font-family: monospace; }
        .btn-main { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--orange), #ff8c42); border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 0 25px var(--orange); }
        #result { margin-top: 25px; padding: 20px; background: rgba(0, 255, 150, 0.1); border: 1px dashed #00ffaa; border-radius: 12px; display: none; }
        .url { background: #000; padding: 10px; border-radius: 6px; font-size: 11px; color: #00ffaa; word-break: break-all; margin: 10px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h1>VIZUSITES v5</h1>
        <input type="text" id="pass" placeholder="Digite netchaveapi">
        <button class="btn-main" onclick="entrar()">ENTRAR NO PAINEL</button>
    </div>

    <div id="app-screen" class="card hidden">
        <h1>GITHUB REPO ENGINE</h1>
        <input type="text" id="repoName" placeholder="Nome do Projeto (ex: meu-site-novo)">
        <textarea id="htmlInput" placeholder="Cole seu código HTML aqui..."></textarea>
        <button class="btn-main" id="btnDeploy" onclick="deployRepo()">🚀 CRIAR REPOSITÓRIO E PUBLICAR</button>

        <div id="result">
            <p style="font-size: 11px; color: #00ffaa;">✅ SITE PUBLICADO NO GITHUB!</p>
            <div class="url" id="urlText">URL DO SITE</div>
            <a id="linkBtn" href="#" target="_blank" style="color:white; font-weight:bold;">🌍 ABRIR SITE</a>
        </div>
    </div>

    <script>
        // TOKEN CONFIGURADO (Precisa da permissão 'repo' no GitHub)
        const GITHUB_TOKEN = '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';

        function entrar() {
            if(document.getElementById('pass').value === "netchaveapi") {
                localStorage.setItem('vizu_v5', 'ok');
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
            }
        }

        if(localStorage.getItem('vizu_v5')) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
        }

        async function deployRepo() {
            const name = document.getElementById('repoName').value.trim().toLowerCase().replace(/\s+/g, '-');
            const html = document.getElementById('htmlInput').value.trim();
            const btn = document.getElementById('btnDeploy');

            if(!name || !html) return alert("Preencha o nome e o código!");

            btn.disabled = true;
            btn.innerText = "CRIANDO REPOSITÓRIO...";

            try {
                // 1. Criar o Repositório
                const repoRes = await fetch('https://api.github.com/user/repos', {
                    method: 'POST',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, auto_init: true })
                });
                const repoData = await repoRes.json();

                // 2. Criar o arquivo index.html no Repo
                btn.innerText = "ENVIANDO ARQUIVOS...";
                const fileRes = await fetch(`https://api.github.com/repos/${repoData.owner.login}/${name}/contents/index.html`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Initial commit by Vizusites",
                        content: btoa(unescape(encodeURIComponent(html)))
                    })
                });

                if(fileRes.ok) {
                    // 3. Link via Githack (mais rápido que esperar o GitHub Pages propagar)
                    const finalUrl = `https://raw.githack.com/${repoData.owner.login}/${name}/main/index.html`;
                    
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('urlText').innerText = finalUrl;
                    document.getElementById('linkBtn').href = finalUrl;
                    btn.innerText = "SITE PUBLICADO!";
                }
            } catch (e) {
                alert("Erro ao criar repositório. Verifique se o nome já existe.");
                btn.disabled = false;
                btn.innerText = "PUBLICAR AGORA";
            }
        }
    </script>
</body>
              </html>
