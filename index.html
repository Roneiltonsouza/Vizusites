<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizusites v5.7 - Link Direto</title>
    <style>
        :root { --neon: #ff6a00; --blue: #00d2ff; --bg: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .card { 
            width: 100%; max-width: 420px; background: rgba(30, 41, 59, 0.95); 
            padding: 30px; border-radius: 20px; border: 2px solid var(--neon);
            box-shadow: 0 0 30px rgba(255, 106, 0, 0.2); text-align: center;
        }

        h1 { color: var(--neon); font-size: 22px; text-transform: uppercase; margin-bottom: 5px; }
        input, textarea { 
            width: 100%; background: #000; border: 1px solid #333; 
            padding: 15px; color: var(--blue); margin-top: 10px; border-radius: 10px; outline: none; 
        }
        textarea { height: 160px; font-family: monospace; font-size: 12px; }

        .btn-main { 
            width: 100%; padding: 20px; background: linear-gradient(135deg, var(--neon), #ff8c42); 
            border: none; border-radius: 12px; color: white; font-weight: 900; 
            cursor: pointer; margin-top: 20px; text-transform: uppercase;
        }

        #res { 
            margin-top: 20px; padding: 15px; background: rgba(0, 255, 150, 0.1); 
            border: 1px solid #00ffaa; border-radius: 10px; display: none; 
        }
        .hidden { display: none !important; }
        .footer-link { margin-top: 20px; font-size: 10px; color: #444; cursor: pointer; display: block; }
    </style>
</head>
<body>

    <div id="setup" class="card">
        <h1>CONFIGURAÇÃO</h1>
        <p style="font-size:11px; color:#888">Insira seu Token GitHub (ghp_...)</p>
        <input type="password" id="tk" placeholder="Cole sua Chave Aqui">
        <button class="btn-main" onclick="save()">ATIVAR MOTOR</button>
    </div>

    <div id="app" class="card hidden">
        <h1>VIZUSITES REPO</h1>
        <p style="font-size:10px; color: #00ffaa">MOTOR CDN ATIVO (LINK DIRETO) ⚡</p>
        
        <input type="text" id="name" placeholder="Nome do Site (ex: meu-app-direto)">
        <textarea id="html" placeholder="Cole seu código HTML completo aqui..."></textarea>
        
        <button class="btn-main" id="go" onclick="deploy()">GERAR LINK DIRETO</button>

        <div id="res">
            <p style="color: #00ffaa; font-weight: bold; margin-bottom: 5px;">✅ SITE PUBLICADO!</p>
            <a id="finalLink" href="#" target="_blank" style="color: var(--blue); font-size: 12px; word-break: break-all; text-decoration: none; font-weight: bold;">ABRIR SITE AGORA</a>
        </div>

        <span class="footer-link" onclick="localStorage.clear(); location.reload()">Trocar Chave API / Sair</span>
    </div>

    <script>
        function save() {
            const t = document.getElementById('tk').value.trim();
            if(t.startsWith('ghp_')) {
                localStorage.setItem('v_key', t);
                location.reload();
            } else { alert("Token inválido!"); }
        }

        if(localStorage.getItem('v_key')) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }

        async function deploy() {
            const token = localStorage.getItem('v_key');
            const nome = document.getElementById('name').value.trim().toLowerCase().replace(/\s+/g, '-');
            const code = document.getElementById('html').value.trim();
            const b = document.getElementById('go');
            const rDiv = document.getElementById('res');

            if(!nome || !code) return alert("Preencha todos os campos!");

            b.disabled = true;
            b.innerText = "CRIANDO LINK DIRETO...";

            try {
                // 1. Pegar login do usuário
                const userRes = await fetch('https://api.github.com/user', {
                    headers: { 'Authorization': `token ${token}` }
                });
                const userData = await userRes.json();
                if(!userRes.ok) throw new Error("Token Inválido.");

                // 2. Criar Repositório
                const repoRes = await fetch('https://api.github.com/user/repos', {
                    method: 'POST',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ name: nome, auto_init: true })
                });

                if(repoRes.status === 422) throw new Error("Esse nome já existe no seu GitHub!");

                // 3. Enviar Arquivo
                await fetch(`https://api.github.com/repos/${userData.login}/${nome}/contents/index.html`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({
                        message: "Deploy Direto",
                        content: btoa(unescape(encodeURIComponent(code)))
                    })
                });

                // LINK DE PRODUÇÃO (PULA A TELA DE AVISO)
                const url = `https://rawcdn.githack.com/${userData.login}/${nome}/main/index.html`;
                
                rDiv.style.display = 'block';
                document.getElementById('finalLink').href = url;
                document.getElementById('finalLink').innerText = "CLIQUE AQUI PARA ABRIR O SITE";
                b.innerText = "SITE PUBLICADO!";

            } catch(e) {
                alert("Erro: " + e.message);
                b.disabled = false;
                b.innerText = "TENTAR NOVAMENTE";
            }
        }
    </script>
</body>
</html>
