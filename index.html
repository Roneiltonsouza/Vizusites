<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizusites v5.3</title>
    <style>
        :root { --neon: #ff6a00; --bg: #0f172a; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: rgba(30, 41, 59, 0.9); padding: 25px; border-radius: 15px; border: 1px solid var(--neon); text-align: center; }
        input, textarea { width: 100%; background: #000; border: 1px solid #333; padding: 12px; color: #00d2ff; margin-top: 10px; border-radius: 8px; outline: none; }
        .btn-main { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--neon), #ff8c42); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login" class="card">
        <h1 style="color: var(--neon)">VIZUSITES</h1>
        <input type="password" id="pass" placeholder="ID Único (netchaveapi)">
        <button class="btn-main" onclick="logar()">ENTRAR</button>
    </div>

    <div id="painel" class="card hidden">
        <h2 style="font-size: 14px; color: #00d2ff">🚀 REPO ENGINE</h2>
        <input type="text" id="repo" placeholder="Nome único do site">
        <textarea id="html" style="height: 150px" placeholder="Cole o HTML aqui..."></textarea>
        <button class="btn-main" id="btn" onclick="publicar()">PUBLICAR AGORA</button>
        <div id="res" style="margin-top: 15px; display: none; color: #00ffaa; font-size: 12px;"></div>
    </div>

    <script>
        // SE O SEU TOKEN ANTIGO FOI CANCELADO, COLOQUE O NOVO AQUI
        const TOKEN = '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';

        function logar() {
            if(document.getElementById('pass').value === "netchaveapi") {
                localStorage.setItem('vizu_v5_lock', 'ok');
                document.getElementById('login').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
            }
        }

        if(localStorage.getItem('vizu_v5_lock')) {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('painel').classList.remove('hidden');
        }

        async function publicar() {
            const nome = document.getElementById('repo').value.trim().toLowerCase().replace(/\s+/g, '-');
            const code = document.getElementById('html').value;
            const b = document.getElementById('btn');
            
            if(!nome || !code) return alert("Preencha os campos!");
            b.innerText = "PROCESSANDO...";

            try {
                const r = await fetch('https://api.github.com/user/repos', {
                    method: 'POST',
                    headers: { 'Authorization': `token ${TOKEN}` },
                    body: JSON.stringify({ name: nome, auto_init: true })
                });

                if(r.status === 422) {
                    alert("O nome '" + nome + "' já existe no seu GitHub. Escolha outro!");
                    b.innerText = "PUBLICAR AGORA";
                    return;
                }

                const d = await r.json();
                await fetch(`https://api.github.com/repos/${d.owner.login}/${nome}/contents/index.html`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${TOKEN}` },
                    body: JSON.stringify({ message: "deploy", content: btoa(unescape(encodeURIComponent(code))) })
                });

                const link = `https://raw.githack.com/${d.owner.login}/${nome}/main/index.html`;
                document.getElementById('res').style.display = 'block';
                document.getElementById('res').innerHTML = `✅ SUCESSO!<br><a href="${link}" target="_blank" style="color:#00d2ff">${link}</a>`;
                b.innerText = "SITE PUBLICADO!";
            } catch(e) {
                alert("Erro de conexão ou Token inválido.");
                b.innerText = "PUBLICAR AGORA";
            }
        }
    </script>
</body>
</html>
